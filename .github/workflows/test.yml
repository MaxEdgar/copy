# CI: make sure the thing still builds on every push/PR.
# Doesn't lint or test, just checks `make` succeeds with warnings on.
# Kept separate from release.yml since that one's a full cross-platform
# matrix and we don't want that running on every commit.

name: Test

on:
  push:
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"
  pull_request:
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"

permissions:
  contents: read

# cancel stale runs on new pushes to the same branch/PR
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # don't bail on one OS failing, we want to see both results
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # -Werror here so CI stays strict even if someone's local CFLAGS is looser
      - name: Build with strict warnings
        run: make CFLAGS="-O2 -Wall -Wextra -Werror"

      - name: Smoke test
        run: |
          ./copy --version
          ./copy --help > /dev/null
          echo "smoke test ok" | ./copy --help > /dev/null

      - name: Clean
        run: make clean
